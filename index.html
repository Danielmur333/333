<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система обращений - База данных</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .dashboard-container {
            max-width: 1200px;
            width: 90%;
            margin: 2rem auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .error {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 0.5rem;
            text-align: center;
        }

        .success {
            color: #10b981;
            font-size: 14px;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* Стили для дашборда */
        .dashboard-header {
            background: white;
            border-radius: 20px;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: #e2e8f0;
            color: #2d3748;
        }

        .role-badge.admin {
            background: #fbbf24;
            color: #78350f;
        }

        .role-badge.user {
            background: #86efac;
            color: #14532d;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .center-content {
            text-align: center;
        }

        .ticket-btn {
            padding: 16px 32px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ticket-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .tickets-list {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .ticket-item {
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .ticket-content {
            flex: 1;
        }

        .ticket-actions {
            display: flex;
            gap: 0.5rem;
        }

        .delete-ticket {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .ticket-date {
            color: #718096;
            font-size: 12px;
            margin-top: 0.5rem;
        }

        .sort-btn {
            margin-bottom: 1rem;
            padding: 8px 16px;
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .stats {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
        }

        textarea {
            resize: vertical;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ========== БАЗА ДАННЫХ (Database Module) ==========
        // Эмуляция работы с базой данных через localStorage
        
        class Database {
            constructor() {
                this.init();
            }

            // Инициализация БД с начальными данными
            init() {
                if (!localStorage.getItem('db_users')) {
                    const initialUsers = [
                        { id: 1, login: 'user', password: 'user123', role: 'user', name: 'Иван Петров', avatar: 'ИП', email: 'ivan@example.com', createdAt: new Date().toISOString() },
                        { id: 2, login: 'admin', password: 'admin123', role: 'admin', name: 'Алексей Админов', avatar: 'АА', email: 'admin@example.com', createdAt: new Date().toISOString() }
                    ];
                    localStorage.setItem('db_users', JSON.stringify(initialUsers));
                }

                if (!localStorage.getItem('db_tickets')) {
                    const initialTickets = [
                        { id: 1001, text: 'Не работает кнопка на главной странице', username: 'Иван Петров', userId: 1, date: new Date().toISOString(), createdAt: Date.now() - 86400000, status: 'open' },
                        { id: 1002, text: 'Как изменить пароль?', username: 'Иван Петров', userId: 1, date: new Date(Date.now() - 43200000).toISOString(), createdAt: Date.now() - 43200000, status: 'open' }
                    ];
                    localStorage.setItem('db_tickets', JSON.stringify(initialTickets));
                }

                if (!localStorage.getItem('db_logs')) {
                    localStorage.setItem('db_logs', JSON.stringify([]));
                }
            }

            // Таблица users
            getUsers() {
                return JSON.parse(localStorage.getItem('db_users'));
            }

            getUserByLogin(login) {
                const users = this.getUsers();
                return users.find(u => u.login === login);
            }

            getUserById(id) {
                const users = this.getUsers();
                return users.find(u => u.id === id);
            }

            // Таблица tickets
            getTickets() {
                return JSON.parse(localStorage.getItem('db_tickets'));
            }

            getTicketsByUserId(userId) {
                const tickets = this.getTickets();
                return tickets.filter(t => t.userId === userId);
            }

            getAllTicketsWithUser() {
                const tickets = this.getTickets();
                const users = this.getUsers();
                return tickets.map(ticket => ({
                    ...ticket,
                    userInfo: users.find(u => u.id === ticket.userId)
                }));
            }

            addTicket(text, userId, username) {
                const tickets = this.getTickets();
                const newTicket = {
                    id: Date.now(),
                    text: text,
                    username: username,
                    userId: userId,
                    date: new Date().toISOString(),
                    createdAt: Date.now(),
                    status: 'open'
                };
                tickets.push(newTicket);
                localStorage.setItem('db_tickets', JSON.stringify(tickets));
                this.addLog('CREATE_TICKET', userId, `Создано обращение: ${text.substring(0, 50)}`);
                return newTicket;
            }

            deleteTicket(ticketId, userId) {
                let tickets = this.getTickets();
                const deletedTicket = tickets.find(t => t.id === ticketId);
                tickets = tickets.filter(t => t.id !== ticketId);
                localStorage.setItem('db_tickets', JSON.stringify(tickets));
                this.addLog('DELETE_TICKET', userId, `Удалено обращение #${ticketId}`);
                return deletedTicket;
            }

            updateTicketStatus(ticketId, status) {
                let tickets = this.getTickets();
                const ticket = tickets.find(t => t.id === ticketId);
                if (ticket) {
                    ticket.status = status;
                    localStorage.setItem('db_tickets', JSON.stringify(tickets));
                }
            }

            // Таблица логов (для демонстрации работы БД)
            getLogs() {
                return JSON.parse(localStorage.getItem('db_logs'));
            }

            addLog(action, userId, details) {
                const logs = this.getLogs();
                logs.push({
                    id: Date.now(),
                    action: action,
                    userId: userId,
                    details: details,
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem('db_logs', JSON.stringify(logs));
            }

            // Статистика БД
            getStats() {
                return {
                    usersCount: this.getUsers().length,
                    ticketsCount: this.getTickets().length,
                    logsCount: this.getLogs().length,
                    lastTicket: this.getTickets().sort((a,b) => b.createdAt - a.createdAt)[0]
                };
            }
        }

        // Создаём экземпляр базы данных
        const db = new Database();

        // ========== КОМПОНЕНТЫ ПРИЛОЖЕНИЯ ==========
        
        // Страница входа (первая - просто кнопка)
        function FirstPage() {
            const container = document.getElementById('app');
            container.innerHTML = `
                <div class="container">
                    <h1>📱 Система обращений</h1>
                    <p style="text-align: center; margin-bottom: 2rem; color: #666;">База данных пользователей и обращений</p>
                    <button id="enterBtn" class="btn btn-primary">🔐 Вход в систему</button>
                    <div class="stats" style="margin-top: 1.5rem;">
                        <span>📊 Статистика БД:</span>
                        <span>👥 ${db.getStats().usersCount} пользователей</span>
                        <span>📝 ${db.getStats().ticketsCount} обращений</span>
                    </div>
                </div>
            `;
            document.getElementById('enterBtn').addEventListener('click', () => {
                LoginPage((user) => {
                    if (user.role === 'admin') {
                        AdminDashboard(user);
                    } else {
                        UserDashboard(user);
                    }
                });
            });
        }

        // Страница авторизации (логин + пароль)
        function LoginPage(onSuccess) {
            let errorMsg = '';

            const handleLogin = (e) => {
                e.preventDefault();
                const login = document.getElementById('login').value.trim();
                const password = document.getElementById('password').value;

                const user = db.getUserByLogin(login);
                
                if (user && user.password === password) {
                    sessionStorage.setItem('currentUser', JSON.stringify(user));
                    db.addLog('LOGIN', user.id, `Пользователь ${user.login} вошёл в систему`);
                    onSuccess(user);
                } else {
                    errorMsg = '❌ Неверный логин или пароль';
                    render();
                }
            };

            const render = () => {
                const container = document.getElementById('app');
                container.innerHTML = `
                    <div class="container">
                        <h1>🔐 Авторизация</h1>
                        <form id="loginForm">
                            <div class="input-group">
                                <label>👤 Логин</label>
                                <input type="text" id="login" placeholder="user / admin" required>
                            </div>
                            <div class="input-group">
                                <label>🔑 Пароль</label>
                                <input type="password" id="password" placeholder="user123 / admin123" required>
                            </div>
                            ${errorMsg ? `<div class="error">${errorMsg}</div>` : ''}
                            <button type="submit" class="btn btn-primary">Войти</button>
                        </form>
                        <p style="margin-top: 1rem; font-size: 12px; color: #718096; text-align: center;">
                            📌 Тестовые данные из БД:<br>
                            user / user123 | admin / admin123
                        </p>
                    </div>
                `;
                document.getElementById('loginForm').addEventListener('submit', handleLogin);
            };

            render();
        }

        // Панель обычного пользователя
        function UserDashboard(user) {
            const container = document.getElementById('app');
            
            const showTicketModal = () => {
                const modalDiv = document.createElement('div');
                modalDiv.className = 'modal';
                modalDiv.innerHTML = `
                    <div class="modal-content">
                        <h3>📝 Новое обращение</h3>
                        <textarea id="ticketText" rows="4" placeholder="Опишите вашу проблему..."></textarea>
                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button id="submitTicket" class="btn btn-primary" style="flex:1">Отправить</button>
                            <button id="closeModal" style="flex:1; background:#ccc;">Отмена</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modalDiv);
                
                document.getElementById('submitTicket').onclick = () => {
                    const text = document.getElementById('ticketText').value.trim();
                    if (text) {
                        db.addTicket(text, user.id, user.name);
                        alert('✅ Обращение отправлено в БД!');
                        modalDiv.remove();
                        render();
                    } else {
                        alert('Введите текст обращения');
                    }
                };
                document.getElementById('closeModal').onclick = () => modalDiv.remove();
            };

            const renderMyTickets = () => {
                const myTickets = db.getTicketsByUserId(user.id);
                const container = document.getElementById('myTickets');
                if (!container) return;
                
                if (myTickets.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#718096;">У вас пока нет обращений</p>';
                    return;
                }
                
                container.innerHTML = myTickets.map(ticket => `
                    <div class="ticket-item">
                        <div class="ticket-content">
                            <p>${ticket.text}</p>
                            <div class="ticket-date">📅 ${new Date(ticket.date).toLocaleString('ru-RU')}</div>
                        </div>
                    </div>
                `).join('');
            };

            const render = () => {
                container.innerHTML = `
                    <div class="dashboard-container">
                        <div class="dashboard-header">
                            <div class="user-info">
                                <div class="avatar">${user.avatar}</div>
                                <div>
                                    <strong>${user.name}</strong>
                                    <div class="role-badge user">👤 Пользователь</div>
                                    <div style="font-size: 12px; color: #666;">ID в БД: ${user.id}</div>
                                </div>
                            </div>
                            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                        </div>
                        <div class="center-content">
                            <button class="ticket-btn" id="openTicketBtn">📨 Создать обращение</button>
                        </div>
                        <div class="tickets-list">
                            <h3>📋 Мои обращения (из БД)</h3>
                            <div id="myTickets"></div>
                        </div>
                        <div style="margin-top: 1rem; padding: 0.75rem; background: #e2e8f0; border-radius: 12px; font-size: 12px; text-align: center;">
                            🗄️ Данные хранятся в localStorage (эмуляция БД)
                        </div>
                    </div>
                `;
                document.getElementById('openTicketBtn').addEventListener('click', showTicketModal);
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    db.addLog('LOGOUT', user.id, `Пользователь ${user.login} вышел`);
                    sessionStorage.removeItem('currentUser');
                    FirstPage();
                });
                renderMyTickets();
            };
            render();
        }

        // Панель администратора
        function AdminDashboard(user) {
            let sortAsc = false;
            
            const deleteTicket = (ticketId) => {
                if (confirm('Удалить обращение из БД?')) {
                    db.deleteTicket(ticketId, user.id);
                    renderTickets();
                }
            };

            const renderTickets = () => {
                let tickets = db.getAllTicketsWithUser();
                
                if (sortAsc) {
                    tickets.sort((a, b) => a.createdAt - b.createdAt);
                } else {
                    tickets.sort((a, b) => b.createdAt - a.createdAt);
                }
                
                const ticketsContainer = document.getElementById('ticketsList');
                if (!ticketsContainer) return;
                
                if (tickets.length === 0) {
                    ticketsContainer.innerHTML = '<p style="text-align:center; color:#718096;">В БД пока нет обращений</p>';
                    return;
                }
                
                ticketsContainer.innerHTML = tickets.map(ticket => `
                    <div class="ticket-item">
                        <div class="ticket-content">
                            <strong>👤 ${ticket.username}</strong> (ID: ${ticket.userId})
                            <p>${ticket.text}</p>
                            <div class="ticket-date">📅 ${new Date(ticket.date).toLocaleString('ru-RU')}</div>
                        </div>
                        <div class="ticket-actions">
                            <button class="delete-ticket" data-id="${ticket.id}">🗑️ Удалить</button>
                        </div>
                    </div>
                `).join('');
                
                // Добавляем обработчики удаления
                document.querySelectorAll('.delete-ticket').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = parseInt(btn.dataset.id);
                        deleteTicket(id);
                    });
                });
            };
            
            const renderStats = () => {
                const stats = db.getStats();
                const statsContainer = document.getElementById('dbStats');
                if (statsContainer) {
                    statsContainer.innerHTML = `
                        <span>👥 Пользователей: ${stats.usersCount}</span>
                        <span>📝 Обращений: ${stats.ticketsCount}</span>
                        <span>📜 Логов: ${stats.logsCount}</span>
                    `;
                }
            };
            
            const container = document.getElementById('app');
            const render = () => {
                container.innerHTML = `
                    <div class="dashboard-container">
                        <div class="dashboard-header">
                            <div class="user-info">
                                <div class="avatar">${user.avatar}</div>
                                <div>
                                    <strong>${user.name}</strong>
                                    <div class="role-badge admin">👑 Администратор</div>
                                    <div style="font-size: 12px; color: #666;">ID в БД: ${user.id}</div>
                                </div>
                            </div>
                            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                        </div>
                        
                        <div class="stats" id="dbStats"></div>
                        
                        <div style="background: white; border-radius: 20px; padding: 1.5rem;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <h2>📋 Все обращения (из БД)</h2>
                                <button id="sortBtn" class="sort-btn">🔄 Сортировка по дате (новые ↓)</button>
                            </div>
                            <div id="ticketsList"></div>
                        </div>
                    </div>
                `;
                
                renderTickets();
                renderStats();
                
                document.getElementById('sortBtn').addEventListener('click', () => {
                    sortAsc = !sortAsc;
                    document.getElementById('sortBtn').innerText = sortAsc 
                        ? '🔄 Сортировка по дате (старые ↑)' 
                        : '🔄 Сортировка по дате (новые ↓)';
                    renderTickets();
                });
                
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    db.addLog('LOGOUT', user.id, `Админ ${user.login} вышел`);
                    sessionStorage.removeItem('currentUser');
                    FirstPage();
                });
            };
            render();
        }

        // ========== ЗАПУСК ПРИЛОЖЕНИЯ ==========
        const savedUser = sessionStorage.getItem('currentUser');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            if (user.role === 'admin') {
                AdminDashboard(user);
            } else {
                UserDashboard(user);
            }
        } else {
            FirstPage();
        }
    </script>
</body>
</html>
